# ============================================
# Continuous Deployment Workflow
# Builds and pushes Docker image after CI succeeds
# ============================================

name: Continuous Deployment

on:
  # Manual trigger
  workflow_dispatch:

  # Trigger after "Continuous Integration" workflow completes
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed

# Docker image name constructed from repository variables
env:
  IMAGE_NAME: ${{ vars.DOCKER_HUB_USER_NAME }}/${{ vars.DOCKER_REPO_NAME }}

jobs:
  build-image:
    name: Build Docker Image

    # conditions to run this workflow
    # ci workflow should have completed first with success and
    # changes were pushed to main branch
    # or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.head_branch == 'main')

    runs-on: ubuntu-latest

    # in the case of multiple pushed back to back.
    # previous run should be canceled and new one should start.
    concurrency:
      group: deployment
      cancel-in-progress: true

    steps:
      # Checkout the exact commit that triggered CI
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # automatic tags for docker images
      # commit sha and branch name
      # if push is to main branch then latest tag is also created.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      # Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER_NAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Enable advanced Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push image to Docker Hub
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # deploying to AWS EC2
  deploy:
    name: Deploy the application to AWS EC2
    runs-on: ubuntu-latest

    # There should be docker image for the new changes already on docker hub
    # This job will run after docker image job is done.
    needs: [build-image]
    permissions:
      id-token: write
      contents: read

    steps:
      # Chekcout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

        # configuring AWS with github actions to make infrastrucutre on cloud.
        # using oidc
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::208822006913:role/buildr-github-actions-role
          aws-region: us-east-1

        # Setting up terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

        # build infrastructure.
      - name: Terraform init and Apply
        run: |
          cd infra/
          terraform init
          terraform apply -auto-approve

        # get the instance id's and public for testing.
      - name: Get instance id and public ip
        id: tf_outputs
        run: |
          cd infra/
          ID=$(terraform output -raw instance_id)
          IP=$(terraform output -raw public_ip)

          echo "instance_id=$ID" >> $GITHUB_OUTPUT
          echo "public_ip=$IP" >> $GITHUB_OUTPUT

        # install docker on ec2 instance with aws ssm
      - name: Install docker
        run: |
          cd scripts/
          bash install_docker.sh "${{ steps.tf_outputs.outputs.instance_id }}"

        # deploy application to ec2 with aws ssm
      - name: Deploy application
        run: |
          cd scripts/
          bash deploy_app.sh "${{steps.tf_outputs.outputs.instance_id}}" \
                             "${{ env.IMAGE_NAME }}" \
                             "${{steps.tf_outputs.outputs.public_ip}}"

        # destroy the infrastructure
      - name: Terraform destroy infrastructure
        run: terraform destroy -auto-approve
