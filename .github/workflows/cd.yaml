# ============================================
# Continuous Deployment Workflow
# Builds and pushes Docker image after CI succeeds
# ============================================

name: Continuous Deployment

on:
  # Manual trigger
  workflow_dispatch:

  # Trigger after "Continuous Integration" workflow completes
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed

# Docker image name constructed from repository variables
env:
  IMAGE_NAME: ${{ vars.DOCKER_HUB_USER_NAME }}/${{ vars.DOCKER_REPO_NAME }}

jobs:
  build-image:
    name: Build Docker Image

    # conditions to run this workflow
    # ci workflow should have completed first with success and
    # changes were pushed to main branch
    # or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.head_branch == 'main')

    runs-on: ubuntu-latest

    # in the case of multiple pushed back to back.
    # previous run should be canceled and new one should start.
    concurrency:
      group: deployment
      cancel-in-progress: true

    steps:
      # Checkout the exact commit that triggered CI
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # automatic tags for docker images
      # commit sha and branch name
      # if push is to main branch then latest tag is also created.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      # Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER_NAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Enable advanced Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push image to Docker Hub
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
